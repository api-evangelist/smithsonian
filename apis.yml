aid: smithsonian
name: Smithsonian Institution
description: Smithsonian Institution Open Access REST API providing search and retrieval
  of over 4.7 million digitized objects, images, 3D models, and metadata across 19
  museums and research centers. All content is released under CC0 (public domain)
  and covers art and design, history and culture, and science and technology collections.
